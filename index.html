<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sorpresa para Estefany</title>
  <style>
    body {
      margin:0;
      background: linear-gradient(to right, #ffc0cb, #ff99cc);
      overflow:hidden;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align:center;
      color:#800080;
    }

    #inicio{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:10;
    }

    button{
      font-size:25px;
      padding:15px 30px;
      background:#ff3399;
      border:none;
      color:white;
      border-radius:30px;
      box-shadow:0 0 20px #ff66cc;
      cursor:pointer;
    }

    button:hover{
      transform:scale(1.1);
    }

    #contenido{
      display:none;
      position:relative;
      z-index:5;
    }

    h1{
      margin-top:100px;
      font-size:55px;
      color:#ff0066;
      font-family:'Brush Script MT', cursive;
      text-shadow:0 0 25px #ff99cc;
    }

    h2{
      font-size:45px;
      color:#9933ff;
      font-family:'Brush Script MT', cursive;
      text-shadow:0 0 20px #cc99ff;
    }

    p{
      font-size:25px;
      color:#4d004d;
      font-family:'Lucida Handwriting', cursive;
    }

    #canvas{
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:1;
    }
  </style>
</head>
<body>

<div id="inicio">
  <button onclick="abrirSorpresa()">💌 Abrir sorpresa</button>
</div>

<canvas id="canvas"></canvas>

<div id="contenido">
  <h1>FELIZ DÍA DE LA MUJER</h1>
  <h2 id="nombre"></h2>
  <p>Eres una persona muy especial</p>
  <p>Quería desearte un lindo día</p>
  <p>Eres una gran mujer y espero que sigas adelante</p>
  <p>Con todo lo que te propongas TE QUIERO MUCHO 😊</p>
  <p>Que tu día esté lleno de alegría y amor 💖</p>
  <p>🌸💜🌸</p>
</div>

<!-- Música de fondo -->
<audio id="miAudio" loop>
  <source src="audio/musica.mp3" type="audio/mpeg">
</audio>

<script>
  // ===== Abrir sorpresa =====
  function abrirSorpresa(){
    document.getElementById("inicio").style.display = "none";
    document.getElementById("contenido").style.display = "block";
    document.getElementById("miAudio").play();
    escribir();
    animar();
    setTimeout(formarCorazon,3000);
  }

  // ===== Texto animado =====
  const texto="ESTEFANY ❤️";
  let i=0;
  function escribir(){
    if(i<texto.length){
      document.getElementById("nombre").innerHTML+=texto.charAt(i);
      i++;
      setTimeout(escribir,200);
    }
  }

  // ===== Canvas y partículas =====
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];
  for(let i=0; i<100; i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:canvas.height+Math.random()*100,
      vx:(Math.random()-0.5)*4,
      vy:-Math.random()*8-2,
      size:Math.random()*4+2,
      color:`hsl(${Math.random()*360},100%,70%)`
    });
  }

  function animar(){
    ctx.fillStyle="rgba(255,192,203,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p)=>{
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=0.1;

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();

      if(p.y>canvas.height || p.x<0 || p.x>canvas.width){
        p.x=Math.random()*canvas.width;
        p.y=canvas.height+10;
        p.vx=(Math.random()-0.5)*4;
        p.vy=-Math.random()*8-2;
        p.color=`hsl(${Math.random()*360},100%,70%)`;
      }
    });

    requestAnimationFrame(animar);
  }

  // ===== Partículas formando corazón =====
  function formarCorazon(){
    let centerX = canvas.width/2;
    let centerY = canvas.height/2;
    let heartParticles = [];
    const scale = 15;

    for(let t=0; t<2*Math.PI; t+=0.1){
      let x = 16*Math.pow(Math.sin(t),3);
      let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
      heartParticles.push({
        x:centerX + x*scale,
        y:centerY + y*scale,
        color:`hsl(${Math.random()*360},100%,70%)`,
        size:5
      });
    }

    let angle = 0;
    function animarCorazon(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      angle += 0.02;
      heartParticles.forEach(p=>{
        let x = centerX + (p.x-centerX)*Math.cos(angle) - (p.y-centerY)*Math.sin(angle);
        let y = centerY + (p.x-centerX)*Math.sin(angle) + (p.y-centerY)*Math.cos(angle);
        ctx.beginPath();
        ctx.arc(x,y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
      });
      requestAnimationFrame(animarCorazon);
    }

    animarCorazon();
  }
</script>

</body>
</html>
