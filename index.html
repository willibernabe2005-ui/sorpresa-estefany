<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Sorpresa para Estefany</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

/* pantalla inicio */

#inicio{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
font-size:25px;
padding:15px 30px;
background:#ff4da6;
border:none;
color:white;
border-radius:30px;
box-shadow:0 0 20px #ff4da6;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

/* contenido */

#contenido{
display:none;
}

h1{
margin-top:120px;
font-size:55px;
color:#ff4da6;
text-shadow:0 0 25px #ff4da6;
}

h2{
font-size:45px;
color:#ff99cc;
text-shadow:0 0 20px #ff99cc;
}

/* corazones */

.heart{
position:absolute;
font-size:25px;
animation:subir 6s linear infinite;
}

/* flores */

.flower{
position:absolute;
font-size:25px;
animation:subir 8s linear infinite;
}

@keyframes subir{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>

</head>

<body>

<div id="inicio">
<button onclick="abrirSorpresa()">💌 Abrir sorpresa</button>
</div>

<div id="contenido">

<h1>FELIZ DÍA DE LA MUJER</h1>

<h2 id="nombre"></h2>

<p>Hoy quiero recordarte lo especial que eres</p>

<p>Te quiero mucho</p>

<p>🌸 Que tengas un hermoso día 🌸</p>

</div>

<script>

function abrirSorpresa(){

document.getElementById("inicio").style.display="none";
document.getElementById("contenido").style.display="block";

escribir();

}

/* escribir nombre */

const texto="ESTEFANY ❤️";
let i=0;

function escribir(){

if(i<texto.length){

document.getElementById("nombre").innerHTML+=texto.charAt(i);

i++;

setTimeout(escribir,200);

}

}

/* corazones */

function crearCorazon(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(crearCorazon,400);

/* flores */

function crearFlor(){

const flower=document.createElement("div");

flower.classList.add("flower");

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},8000);

}

setInterval(crearFlor,900);

</script>

</body>
</html>
